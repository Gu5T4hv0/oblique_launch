<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lançamento Oblíquo</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #060a10;
    --panel: #0c1420;
    --border: #1a2d4a;
    --accent: #00d4ff;
    --accent2: #ff6b35;
    --accent3: #7fff6b;
    --text: #c8dff0;
    --muted: #4a6880;
    --glow: 0 0 20px rgba(0,212,255,0.35);
    --glow2: 0 0 20px rgba(255,107,53,0.35);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
    overflow-x: hidden;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 820px;
  }

  /* Header */
  header {
    text-align: center;
    margin-bottom: 48px;
  }

  .header-tag {
    font-size: 11px;
    letter-spacing: 5px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 10px;
    opacity: 0.7;
  }

  h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(26px, 5vw, 42px);
    font-weight: 900;
    letter-spacing: 2px;
    color: #fff;
    text-shadow: 0 0 30px rgba(0,212,255,0.5);
    line-height: 1.1;
  }

  h1 span { color: var(--accent); }

  .subtitle {
    margin-top: 10px;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 2px;
  }

  /* Arc SVG decoration */
  .arc-decoration {
    display: block;
    margin: 20px auto 0;
    opacity: 0.25;
  }

  /* Input panel */
  .input-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-top: 2px solid var(--accent);
    padding: 32px;
    margin-bottom: 24px;
    position: relative;
    clip-path: polygon(0 0, calc(100% - 20px) 0, 100% 20px, 100% 100%, 0 100%);
  }

  .input-panel::before {
    content: 'INPUT';
    position: absolute;
    top: -1px; left: 24px;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--accent);
    background: var(--panel);
    padding: 0 8px;
    transform: translateY(-50%);
  }

  .input-row {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  label {
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    white-space: nowrap;
  }

  .input-wrapper {
    display: flex;
    align-items: center;
    flex: 1;
    min-width: 200px;
    border: 1px solid var(--border);
    border-bottom: 2px solid var(--accent);
    background: rgba(0,212,255,0.03);
    transition: all 0.2s;
  }

  .input-wrapper:focus-within {
    border-color: var(--accent);
    box-shadow: var(--glow);
    background: rgba(0,212,255,0.07);
  }

  input[type=number] {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: #fff;
    font-family: 'Orbitron', sans-serif;
    font-size: 22px;
    font-weight: 700;
    padding: 12px 16px;
    width: 100%;
  }

  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }

  .unit {
    padding: 12px 16px;
    color: var(--accent);
    font-size: 13px;
    letter-spacing: 1px;
    border-left: 1px solid var(--border);
  }

  .fire-btn {
    width: 100%;
    margin-top: 28px;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'Orbitron', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 5px;
    padding: 16px;
    cursor: pointer;
    text-transform: uppercase;
    position: relative;
    overflow: hidden;
    transition: all 0.2s;
    clip-path: polygon(10px 0, 100% 0, calc(100% - 10px) 100%, 0 100%);
  }

  .fire-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.25s ease;
    z-index: 0;
  }

  .fire-btn:hover::before { transform: scaleX(1); }
  .fire-btn:hover { color: var(--bg); }
  .fire-btn span { position: relative; z-index: 1; }

  .fire-btn:active { transform: scale(0.98); }

  /* Results grid */
  .results-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 16px;
  }

  .force-card {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 24px;
    position: relative;
    transition: transform 0.2s, box-shadow 0.2s;
    opacity: 0;
    transform: translateY(20px);
    animation: none;
  }

  .force-card.visible {
    animation: fadeUp 0.4s ease forwards;
  }

  .force-card:nth-child(2).visible { animation-delay: 0.08s; }
  .force-card:nth-child(3).visible { animation-delay: 0.16s; }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }

  .force-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
  }

  .force-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .force-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 20px;
    font-weight: 900;
    margin-bottom: 4px;
  }

  .force-v0 {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }

  .force-v0 span { color: var(--text); }

  /* Color variants */
  .force-card:nth-child(1) .force-title { color: var(--accent); }
  .force-card:nth-child(1) { border-top: 2px solid var(--accent); }
  .force-card:nth-child(2) .force-title { color: var(--accent2); }
  .force-card:nth-child(2) { border-top: 2px solid var(--accent2); }
  .force-card:nth-child(3) .force-title { color: var(--accent3); }
  .force-card:nth-child(3) { border-top: 2px solid var(--accent3); }

  .angle-row {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .angle-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }

  .angle-tag {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    white-space: nowrap;
  }

  .angle-bar-wrap {
    flex: 1;
    height: 4px;
    background: var(--border);
    position: relative;
    overflow: hidden;
  }

  .angle-bar {
    height: 100%;
    background: currentColor;
    width: 0%;
    transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .angle-value {
    font-family: 'Orbitron', sans-serif;
    font-size: 16px;
    font-weight: 700;
    white-space: nowrap;
    min-width: 72px;
    text-align: right;
  }

  .angle-value sup {
    font-size: 10px;
    opacity: 0.6;
  }

  /* Error state */
  .miss-alert {
    display: flex;
    align-items: center;
    gap: 10px;
    color: #ff4444;
    font-size: 12px;
    letter-spacing: 1px;
    padding: 12px 0;
  }

  .miss-icon {
    width: 28px; height: 28px;
    border: 1px solid #ff4444;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0;
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Idle placeholder */
  .idle-msg {
    text-align: center;
    padding: 48px;
    color: var(--muted);
    font-size: 13px;
    letter-spacing: 2px;
    border: 1px dashed var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }

  .idle-msg svg { opacity: 0.3; }

  /* Corner decoration */
  .corner {
    position: absolute;
    width: 10px; height: 10px;
    border-color: var(--accent);
    border-style: solid;
  }
  .corner.tl { top: 8px; left: 8px; border-width: 1px 0 0 1px; }
  .corner.br { bottom: 8px; right: 8px; border-width: 0 1px 1px 0; }

  .status-bar {
    margin-top: 32px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
  }

  .status-dot {
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--accent3);
    border-radius: 50%;
    margin-right: 6px;
    animation: blink 2s infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; } 50% { opacity: 0.2; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="header-tag">Sistema de Cálculo Balístico</div>
    <h1>LANÇAMENTO<br><span>OBLÍQUO</span></h1>
    <p class="subtitle">Cálculo de ângulos de trajetória para múltiplas forças de lançamento</p>
    <svg class="arc-decoration" width="300" height="60" viewBox="0 0 300 60">
      <path d="M 20 55 Q 150 5 280 55" stroke="#00d4ff" stroke-width="1.5" fill="none" stroke-dasharray="4 3"/>
      <circle cx="20" cy="55" r="3" fill="#00d4ff"/>
      <polygon points="280,55 274,50 274,60" fill="#00d4ff"/>
      <line x1="150" y1="5" x2="150" y2="55" stroke="#00d4ff" stroke-width="0.8" stroke-dasharray="2 3" opacity="0.5"/>
    </svg>
  </header>

  <!-- Input panel -->
  <div class="input-panel">
    <div class="input-row">
      <label for="dist">Distância do alvo</label>
      <div class="input-wrapper">
        <input type="number" id="dist" placeholder="0.00" min="0" step="0.01"/>
        <span class="unit">m</span>
      </div>
    </div>
    <button class="fire-btn" onclick="calcular()">
      <span>▶ &nbsp; CALCULAR TRAJETÓRIA</span>
    </button>
  </div>

  <!-- Results -->
  <div id="output">
    <div class="idle-msg">
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
        <circle cx="24" cy="24" r="22" stroke="#4a6880" stroke-width="1.5"/>
        <path d="M 10 36 Q 24 10 38 36" stroke="#4a6880" stroke-width="1.5" fill="none"/>
        <line x1="24" y1="10" x2="24" y2="36" stroke="#4a6880" stroke-width="0.8" stroke-dasharray="2 2"/>
      </svg>
      Aguardando entrada de distância
    </div>
  </div>

  <div class="status-bar">
    <span><span class="status-dot"></span>SISTEMA PRONTO</span>
    <span>g = 9.8 m/s² &nbsp;|&nbsp; 3 FORÇAS DE LANÇAMENTO</span>
  </div>

</div>

<script>
  // =====================================================
  // ORIGINAL PYTHON LOGIC — ported exactly, no changes
  // to constants, formulas, or conditional structure
  // =====================================================

  function calcular() {
    const distancia_do_alvo = parseFloat(document.getElementById('dist').value);

    if (isNaN(distancia_do_alvo) || distancia_do_alvo < 0) {
      showError("Por favor, insira uma distância válida.");
      return;
    }

    // --- ORIGINAL CODE START ---
    const delta_s1 = 69.312 / 100;   // Mudando para metros
    const delta_s2 = 124.254 / 100;  // Mudando para metros
    const delta_s3 = 202.763 / 100;  // Mudando para metros

    const primeiro_v0 = Math.pow(2 * 9.8 * delta_s1, 1/2);
    const segundo_v0  = Math.pow(2 * 9.8 * delta_s2, 1/2);
    const terceiro_v0 = Math.pow(2 * 9.8 * delta_s3, 1/2);

    const primeiro_cos_mais  = Math.pow((1 + Math.pow(1 - (96.04 * Math.pow(distancia_do_alvo, 2)) / Math.pow(primeiro_v0, 4), 1/2)) / 2, 1/2);
    const primeiro_cos_menos = Math.pow((1 - Math.pow(1 - (96.04 * Math.pow(distancia_do_alvo, 2)) / Math.pow(primeiro_v0, 4), 1/2)) / 2, 1/2);
    const segundo_cos_mais   = Math.pow((1 + Math.pow(1 - (96.04 * Math.pow(distancia_do_alvo, 2)) / Math.pow(segundo_v0, 4),  1/2)) / 2, 1/2);
    const segundo_cos_menos  = Math.pow((1 - Math.pow(1 - (96.04 * Math.pow(distancia_do_alvo, 2)) / Math.pow(segundo_v0, 4),  1/2)) / 2, 1/2);
    const terceiro_cos_mais  = Math.pow((1 + Math.pow(1 - (96.04 * Math.pow(distancia_do_alvo, 2)) / Math.pow(terceiro_v0, 4), 1/2)) / 2, 1/2);
    const terceiro_cos_menos = Math.pow((1 - Math.pow(1 - (96.04 * Math.pow(distancia_do_alvo, 2)) / Math.pow(terceiro_v0, 4), 1/2)) / 2, 1/2);

    let resultados = [];

    // Force 1
    if ((1 - (96.04 * Math.pow(distancia_do_alvo, 2)) / Math.pow(primeiro_v0, 4)) < 0) {
      resultados.push({ label: 'Força 1', v0: primeiro_v0, miss: true });
    } else {
      const menor_angulo1 = (180 / Math.PI) * Math.acos(primeiro_cos_mais);
      const maior_angulo1 = (180 / Math.PI) * Math.acos(primeiro_cos_menos);
      resultados.push({ label: 'Força 1', v0: primeiro_v0, miss: false, menor: menor_angulo1, maior: maior_angulo1 });
    }

    // Force 2
    if ((1 - (96.04 * Math.pow(distancia_do_alvo, 2)) / Math.pow(segundo_v0, 4)) < 0) {
      resultados.push({ label: 'Força 2', v0: segundo_v0, miss: true });
    } else {
      const menor_angulo2 = (180 / Math.PI) * Math.acos(segundo_cos_mais);
      const maior_angulo2 = (180 / Math.PI) * Math.acos(segundo_cos_menos);
      resultados.push({ label: 'Força 2', v0: segundo_v0, miss: false, menor: menor_angulo2, maior: maior_angulo2 });
    }

    // Force 3
    if ((1 - (96.04 * Math.pow(distancia_do_alvo, 2)) / Math.pow(terceiro_v0, 4)) < 0) {
      resultados.push({ label: 'Força 3', v0: terceiro_v0, miss: true });
    } else {
      const menor_angulo3 = (180 / Math.PI) * Math.acos(terceiro_cos_mais);
      const maior_angulo3 = (180 / Math.PI) * Math.acos(terceiro_cos_menos);
      resultados.push({ label: 'Força 3', v0: terceiro_v0, miss: false, menor: menor_angulo3, maior: maior_angulo3 });
    }
    // --- ORIGINAL CODE END ---

    renderResults(resultados);
  }

  function renderResults(resultados) {
    const colors = ['var(--accent)', 'var(--accent2)', 'var(--accent3)'];
    const output = document.getElementById('output');
    output.innerHTML = '<div class="results-grid"></div>';
    const grid = output.querySelector('.results-grid');

    resultados.forEach((r, i) => {
      const card = document.createElement('div');
      card.className = 'force-card';

      let inner = `
        <div class="corner tl"></div>
        <div class="corner br"></div>
        <div class="force-label">Lançamento</div>
        <div class="force-title">${r.label}</div>
        <div class="force-v0">v₀ = <span>${r.v0.toFixed(4)} m/s</span></div>
      `;

      if (r.miss) {
        inner += `
          <div class="miss-alert">
            <div class="miss-icon">✕</div>
            <span>Alvo fora do alcance<br>máximo desta força</span>
          </div>
        `;
      } else {
        const menorPct = (r.menor / 90) * 100;
        const maiorPct = (r.maior / 90) * 100;
        inner += `
          <div class="angle-row">
            <div class="angle-item">
              <span class="angle-tag">Ângulo baixo</span>
              <div class="angle-bar-wrap">
                <div class="angle-bar" data-pct="${menorPct}" style="color:${colors[i]}"></div>
              </div>
              <span class="angle-value" style="color:${colors[i]}">${r.menor.toFixed(2)}<sup>°</sup></span>
            </div>
            <div class="angle-item">
              <span class="angle-tag">Ângulo alto</span>
              <div class="angle-bar-wrap">
                <div class="angle-bar" data-pct="${maiorPct}" style="color:${colors[i]}"></div>
              </div>
              <span class="angle-value" style="color:${colors[i]}">${r.maior.toFixed(2)}<sup>°</sup></span>
            </div>
          </div>
        `;
      }

      card.innerHTML = inner;
      grid.appendChild(card);

      // Trigger animations
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          card.classList.add('visible');
          // Animate bars after card appears
          setTimeout(() => {
            card.querySelectorAll('.angle-bar').forEach(bar => {
              bar.style.width = bar.dataset.pct + '%';
            });
          }, 300 + i * 80);
        });
      });
    });
  }

  function showError(msg) {
    const output = document.getElementById('output');
    output.innerHTML = `<div class="idle-msg" style="color:#ff4444;border-color:#ff4444;opacity:0.7;">${msg}</div>`;
  }

  // Allow Enter key
  document.getElementById('dist').addEventListener('keydown', e => {
    if (e.key === 'Enter') calcular();
  });
</script>
</body>
</html>
